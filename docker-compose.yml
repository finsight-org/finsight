services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight -d finsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      FINSIGHT_ENV: local
      FINSIGHT_HTTP_ADDR: :8080
      FINSIGHT_SERVICE_NAME: finsight-api
      FINSIGHT_VERSION: dev
      FINSIGHT_DATABASE_URL: postgres://finsight:finsight@postgres:5432/finsight?sslmode=disable
      FINSIGHT_READY_TIMEOUT: 2s
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
