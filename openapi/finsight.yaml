openapi: 3.0.3
info:
  title: Finsight API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check API liveness.
      responses:
        "200":
          description: API is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      operationId: getReady
      summary: Check API dependency readiness.
      responses:
        "200":
          description: API dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: API dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /api/accounts:
    post:
      operationId: postAccount
      summary: Create an account in the local default portfolio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Invalid account request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Account name already exists in the default portfolio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Account creation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getAccounts
      summary: List accounts in the local default portfolio.
      responses:
        "200":
          description: Accounts in the local default portfolio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "500":
          description: Account listing failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/accounts/{id}:
    get:
      operationId: getAccount
      summary: Get an account from the local default portfolio.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account in the local default portfolio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account was not found in the local default portfolio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Account lookup failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/local/bootstrap:
    post:
      operationId: postLocalBootstrap
      summary: Create or return the local development identity context.
      responses:
        "200":
          description: Local identity context already existed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalBootstrapResponse"
        "201":
          description: Local identity context was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalBootstrapResponse"
        "500":
          description: Bootstrap failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    AccountType:
      type: string
      enum:
        - BROKERAGE
        - BANK
        - CRYPTO_EXCHANGE
        - RETIREMENT
        - MANUAL
    CreateAccountRequest:
      type: object
      required:
        - name
        - type
        - base_currency
      properties:
        name:
          type: string
          minLength: 1
        institution_name:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/AccountType"
        base_currency:
          type: string
          pattern: "^[A-Z]{3}$"
          minLength: 3
          maxLength: 3
        external_reference:
          type: string
          nullable: true
    Account:
      type: object
      required:
        - id
        - portfolio_id
        - name
        - type
        - base_currency
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        portfolio_id:
          type: string
          format: uuid
        name:
          type: string
        institution_name:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/AccountType"
        base_currency:
          type: string
        external_reference:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AccountListResponse:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"
    CheckState:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - error
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
        version:
          type: string
    LocalBootstrapResponse:
      type: object
      required:
        - created
        - user
        - workspace
        - membership
        - portfolio
      properties:
        created:
          type: boolean
        user:
          $ref: "#/components/schemas/BootstrapUser"
        workspace:
          $ref: "#/components/schemas/BootstrapWorkspace"
        membership:
          $ref: "#/components/schemas/BootstrapWorkspaceMembership"
        portfolio:
          $ref: "#/components/schemas/BootstrapPortfolio"
    BootstrapPortfolio:
      type: object
      required:
        - id
        - workspace_id
        - name
        - base_currency
        - is_default
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        base_currency:
          type: string
        is_default:
          type: boolean
    BootstrapUser:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
    BootstrapWorkspace:
      type: object
      required:
        - id
        - name
        - base_currency
        - auth_mode
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        base_currency:
          type: string
        auth_mode:
          type: string
    BootstrapWorkspaceMembership:
      type: object
      required:
        - id
        - workspace_id
        - user_id
        - role
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
    ReadyResponse:
      type: object
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/CheckState"
